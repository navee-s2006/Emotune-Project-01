<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tamil Song Quiz 🎵</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
        margin: 0;
    }

    .quiz-container {
        background: white;
        width: 350px;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 0 10px #0003;
        text-align: center;
        z-index: 10;
    }

    h1 {
        margin-bottom: 15px;
        color: #d63384;
    }

    #options button {
        width: 100%;
        padding: 12px;
        margin: 8px 0;
        border: none;
        background: #f8f9fa;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
        font-size: 16px;
    }

    #options button:hover {
        background: #ffe5ec;
    }

    .correct { background: #d4edda !important; }
    .wrong { background: #f8d7da !important; }

    #next-btn {
        background: #d63384;
        border: none;
        padding: 12px 20px;
        color: white;
        font-size: 16px;
        border-radius: 8px;
        margin-top: 10px;
        cursor: pointer;
        display: none;
    }

    .hidden { display: none; }

    #result {
        margin-top: 15px;
        font-size: 18px;
        font-weight: bold;
    }

    /* 🍫 Chocolate Shower Animation */
    .choco {
        position: absolute;
        top: -50px;
        font-size: 30px;
        animation: fall 3s linear infinite;
    }

    @keyframes fall {
        0% { transform: translateY(0) rotate(0); opacity: 1; }
        100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
    }
</style>

</head>
<body>

<div class="quiz-container">
    <h1>Tamil Songs Quiz 🎵</h1>

    <div id="question-box">
        <h2 id="question">Loading...</h2>
        <div id="options"></div>
    </div>

    <button id="next-btn" onclick="nextQuestion()">Next</button>

    <div id="result" class="hidden"></div>
</div>

<script>
const quizData = [
    {
        question: "“Why This Kolaveri Di?” song is sung by?",
        options: ["Anirudh", "Dhanush", "Yuvan", "A.R. Rahman"],
        answer: "Dhanush"
    },
    {
        question: "Which movie has the song “Thalapathi Theme”?",
        options: ["Kaala", "Kabali", "Thalapathi", "Baasha"],
        answer: "Thalapathi"
    },
    {
        question: "“Munbe Vaa” song music director?",
        options: ["A.R. Rahman", "Harris Jayaraj", "GV Prakash", "Yuvan"],
        answer: "Harris Jayaraj"
    },
    {
        question: "“Vaathi Coming” is from which hero movie?",
        options: ["Ajith", "Vijay", "Suriya", "Dhanush"],
        answer: "Vijay"
    }
];

let index = 0;
let score = 0;

function loadQuestion() {
    const current = quizData[index];
    document.getElementById("question").innerText = current.question;

    let optionsHTML = "";
    current.options.forEach(opt => {
        optionsHTML += `<button onclick="checkAnswer(this)">${opt}</button>`;
    });

    document.getElementById("options").innerHTML = optionsHTML;
    document.getElementById("next-btn").style.display = "none";
}

function checkAnswer(button) {
    const selected = button.innerText;
    const correct = quizData[index].answer;

    if (selected === correct) {
        button.classList.add("correct");
        score++;
    } else {
        button.classList.add("wrong");
    }

    disableOptions();
    document.getElementById("next-btn").style.display = "block";
}

function disableOptions() {
    const allButtons = document.querySelectorAll("#options button");
    allButtons.forEach(btn => btn.disabled = true);
}

function nextQuestion() {
    index++;

    if (index < quizData.length) {
        loadQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    document.getElementById("question-box").classList.add("hidden");
    document.getElementById("next-btn").remove();  // ❌ Remove next button

    document.getElementById("result").classList.remove("hidden");
    document.getElementById("result").innerText =
        `Quiz Completed! 🎉 Score: ${score}/${quizData.length}`;

    startChocolateShower();  // 🍫 Start celebration!
}

/* 🍫 Chocolate Falling Animation */
function startChocolateShower() {
    for (let i = 0; i < 25; i++) {
        let choco = document.createElement("div");
        choco.classList.add("choco");
        choco.innerHTML = "🍫"; 
        choco.style.left = Math.random() * 100 + "vw";
        choco.style.animationDuration = (Math.random() * 2 + 2) + "s";

        document.body.appendChild(choco);

        setTimeout(() => choco.remove(), 3500);
    }
}

window.onload = loadQuestion;
</script>

</body>
</html>
