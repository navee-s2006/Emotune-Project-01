

 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Face detection</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #121212;
    color: white;
}
#camera {
    width: 320px;
    height: 240px;
    border: 3px solid #fff;
    border-radius: 10px;
}
button {
    padding: 10px 20px;
    margin-top: 10px;
    font-size: 18px;
    border-radius: 8px;
    background: #00ff9f;
    border: none;
    cursor: pointer;
}
#emotion {
    font-size: 30px;
    margin-top: 15px;
    color: #00ff9f;
}

/* Quiz button fixed at bottom */
.quiz-btn {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
}
</style>
</head>

<body>
<h1>Face Detection</h1>

<!-- Camera Preview -->
<video id="camera" autoplay></video><br><br>

<!-- Detect Emotion Button -->
<button onclick="detectEmotion()">Scan Emotion 🎭</button>

<!-- Emotion Display -->
<h2 id="emotion">Emotion: Not detected</h2>

<!-- Music Player -->
<audio id="audioPlayer" controls autoplay></audio>

<!-- QUIZ BUTTON AT BOTTOM -->
<button class="quiz-btn" onclick="goQuiz()">🎵 Go to Quiz</button>

<!-- Connect JS File -->
<script src="script.js"></script>

<script>
function goQuiz() {
    window.location.href = "quiz.html";
}
</script>

</body>
</html>
