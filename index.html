<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emotune - Login/Register</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
    body{background:linear-gradient(135deg,#ff6b6b 0%,#4ecdc4 25%,#45b7d1 50%,#96ceb4 75%,#ffeaa7 100%);background-size:400% 400%;animation:gradientBG 15s ease infinite;min-height:100vh;display:flex;justify-content:center;align-items:center;}
    @keyframes gradientBG{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
    .glass-effect{background:rgba(255,255,255,0.15);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.2);box-shadow:0 8px 32px rgba(31,38,135,0.15);}
    .input-field{background:linear-gradient(135deg,rgba(255,255,255,0.2),rgba(255,255,255,0.15));border:2px solid rgba(255,255,255,0.3);backdrop-filter:blur(10px);color:white;transition:all 0.3s ease;}
    .input-field::placeholder{color:rgba(255,255,255,0.7);}
    .input-field:focus{background:linear-gradient(135deg,rgba(255,255,255,0.25),rgba(255,255,255,0.2));border:2px solid rgba(255,255,255,0.5);box-shadow:0 0 20px rgba(255,255,255,0.2);transform:scale(1.02);}
    .input-field:hover{background:linear-gradient(135deg,rgba(255,255,255,0.22),rgba(255,255,255,0.18));border:2px solid rgba(255,255,255,0.4);}
    .input-label{color:rgba(255,255,255,0.95);text-shadow:0 2px 4px rgba(0,0,0,0.2);font-weight:500;}
</style>
</head>
<body>
<div class="w-full max-w-xl p-8 glass-effect rounded-3xl text-center">

   
    <!-- Logo -->
<div class="mb-6 flex flex-col items-center">
    <video autoplay loop muted playsinline 
        class="w-40 h-40 mb-6 rounded-full shadow-2xl border-4 border-white/20 object-cover mx-auto">
        <source src="emo.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    <h1 class="text-3xl font-bold text-white mb-6">Emotune</h1>
</div>

    <!-- Login Form -->
    <div id="login-form">
        <div class="mb-4 text-left">
            <label class="input-label">Email</label>
            <input type="email" id="login-email" class="input-field w-full px-4 py-3 rounded-lg" placeholder="Enter email">
        </div>
        <div class="mb-4 text-left">
            <label class="input-label">Password</label>
            <input type="password" id="login-password" class="input-field w-full px-4 py-3 rounded-lg" placeholder="Enter password">
        </div>
        <button onclick="login()" class="w-full bg-purple-500 text-white py-3 rounded-lg mb-4 hover:bg-purple-600">Login</button>
        <p class="text-white text-sm">Don't have account? <a href="#" onclick="showRegister()" class="underline">Register</a></p>
    </div>

    <!-- Register Form -->
    <div id="register-form" class="hidden">
        <div class="mb-4 text-left">
            <label class="input-label">Full Name</label>
            <input type="text" id="register-name" class="input-field w-full px-4 py-3 rounded-lg" placeholder="Enter full name">
        </div>
        <div class="mb-4 text-left">
            <label class="input-label">Email</label>
            <input type="email" id="register-email" class="input-field w-full px-4 py-3 rounded-lg" placeholder="Enter email">
        </div>
        <div class="mb-4 text-left">
            <label class="input-label">Password</label>
            <input type="password" id="register-password" class="input-field w-full px-4 py-3 rounded-lg" placeholder="Enter password">
        </div>
        <button onclick="register()" class="w-full bg-green-500 text-white py-3 rounded-lg mb-4 hover:bg-green-600">Register</button>
        <p class="text-white text-sm">Already have account? <a href="#" onclick="showLogin()" class="underline">Login</a></p>
    </div>
</div>

<script>
function showRegister(){ document.getElementById('login-form').classList.add('hidden'); document.getElementById('register-form').classList.remove('hidden'); }
function showLogin(){ document.getElementById('register-form').classList.add('hidden'); document.getElementById('login-form').classList.remove('hidden'); }

let users = JSON.parse(localStorage.getItem('emotume_users')) || [];

function register(){
    const name = document.getElementById('register-name').value.trim();
    const email = document.getElementById('register-email').value.trim().toLowerCase();
    const password = document.getElementById('register-password').value.trim();
    if(!name||!email||!password){ alert('Fill all fields!'); return; }
    if(users.find(u=>u.email===email)){ alert('Email already registered!'); return; }
    const newUser={id:Date.now(),name,email,password};
    users.push(newUser);
    localStorage.setItem('emotume_users',JSON.stringify(users));
    localStorage.setItem('emotume_current_user',JSON.stringify(newUser));
    alert('Registration successful! Redirecting to language page...');
    window.location.href='language.html'; 
}

function login(){
    const email=document.getElementById('login-email').value.trim().toLowerCase();
    const password=document.getElementById('login-password').value.trim();
    const validUser = users.find(u=>u.email===email && u.password===password);
    if(validUser){
        localStorage.setItem('emotume_current_user',JSON.stringify(validUser));
        alert(`Welcome ${validUser.name}! Redirecting to language page...`);
        window.location.href='language.html'; 
    }else{ alert('Invalid email or password!'); }
}
</script>
</body>
</html>
