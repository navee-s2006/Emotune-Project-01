<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emotune - Language Selection</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
    body{
        background:linear-gradient(135deg,#ff6b6b 0%,#4ecdc4 25%,#45b7d1 50%,#96ceb4 75%,#ffeaa7 100%);
        background-size:400% 400%;
        animation:gradientBG 15s ease infinite;
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
    }
    @keyframes gradientBG{
        0%{background-position:0% 50%;}
        50%{background-position:100% 50%;}
        100%{background-position:0% 50%;}
    }
    .glass-effect{
        background:rgba(255,255,255,0.15);
        backdrop-filter:blur(12px);
        border:1px solid rgba(255,255,255,0.2);
        box-shadow:0 8px 32px rgba(31,38,135,0.15);
    }
    .lang-button{
        background:linear-gradient(135deg,rgba(255,255,255,0.2),rgba(255,255,255,0.15));
        border:2px solid rgba(255,255,255,0.3);
        backdrop-filter:blur(10px);
        color:white;
        font-weight:500;
        transition:all 0.3s ease;
    }
    .lang-button:hover{
        background:linear-gradient(135deg,rgba(255,255,255,0.25),rgba(255,255,255,0.2));
        border:2px solid rgba(255,255,255,0.5);
        transform:scale(1.05);
        box-shadow:0 0 20px rgba(255,255,255,0.2);
    }
</style>
</head>
<body>
<div class="w-full max-w-xl p-8 glass-effect rounded-3xl text-center">
    <h1 class="text-3xl font-bold text-white mb-6">Select Your Language</h1>
    <div class="grid grid-cols-2 gap-4">
        <button class="lang-button w-full py-3 rounded-lg" onclick="selectLanguage('Tamil')">தமிழ்</button>
        <button class="lang-button w-full py-3 rounded-lg" onclick="selectLanguage('English')">English</button>
        <button class="lang-button w-full py-3 rounded-lg" onclick="selectLanguage('Hindi')">Hindi</button>
        <button class="lang-button w-full py-3 rounded-lg" onclick="selectLanguage('Telugu')">Telugu</button>
        <button class="lang-button w-full py-3 rounded-lg" onclick="selectLanguage('Malayalam')">Malayalam</button>
        <button class="lang-button w-full py-3 rounded-lg" onclick="selectLanguage('Kannada')">Kannada</button>
    </div>
</div>

<script>
function selectLanguage(lang) {
  // Save language in localStorage
  localStorage.setItem('selectedLanguage', lang);
  // Redirect to music page
  window.location.href = "proj.html";
}
</script>
</body>
</html>
